baseURL = "https://solo-code-tw.github.io/"
title = "Solo Code Blog"
theme = "PaperMod"

[module]
  [[module.imports]]
    path = "github.com/adityatelange/hugo-PaperMod"

[params]
    env = "production"
    title = "Solo Code Blog"
    description = "Clement 的技術與生活隨筆"
    author = "Clement"
    # 關閉資源檢查，解決樣式載入問題
    integrity = false 

    # 首頁個人檔案模式
    [params.profileMode]
        enabled = true
        title = "Hi, I'm Clement"
        subtitle = "軟體工程師 | 系統開發 | 在台北漢來飯店紀錄生活"
        imageUrl = "https://github.com/solo-code-tw.png"
        imageWidth = 120
        imageHeight = 120

# 選單設定（按鈕就在這裡）
[[menu.main]]
    identifier = "categories"
    name = "分類"
    url = "/categories/"
    weight = 10
[[menu.main]]
    identifier = "tags"
    name = "標籤"
    url = "/tags/"
    weight = 20
[[menu.main]]
    identifier = "archives"
    name = "歸檔"
    url = "/archives/"
    weight = 30
