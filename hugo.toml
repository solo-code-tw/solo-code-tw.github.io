baseURL = "https://solo-code-tw.github.io/"
title = "Solo Code Blog"
theme = ["github.com/adityatelange/hugo-PaperMod"]

[module]
  [[module.imports]]
    path = "github.com/adityatelange/hugo-PaperMod"

[params]
    env = "production"
    title = "Solo Code Blog"
    description = "軟體系統開發、底層技術與資安筆記"
    author = "Solo Code"
    integrity = false 

    # 1. 強化首頁門面：將核心技術專案化
    [params.profileMode]
    enabled = true
    title = "Hi, I'm Solo Coding"
    subtitle = "Software Engineer | Windows System Development | Security"
    imageUrl = "https://github.com/solo-code-tw.png"
    
    [[params.profileMode.buttons]]
        name = "🏗️ 系統開發"
        url = "/categories/system-dev/" # 放置如 FSM, Windows API 文章
    [[params.profileMode.buttons]]
        name = "🛡️ 安全研究"
        url = "/categories/security/"    # 放置 Security 文章
    [[params.profileMode.buttons]]
        name = "🛠️ 開發工具箱"
        url = "/categories/tool-box/"   # 放置 Regex, Debug 手法

# 2. 側邊/頂部選單優化：增加搜尋與精選
[[menu.main]]
    identifier = "search"
    name = "🔍 搜尋"
    url = "/search/" # 建議後續開啟 PaperMod 內建搜尋
    weight = 5
[[menu.main]]
    identifier = "posts"
    name = "✍️ 所有文章"
    url = "/posts/"
    weight = 10
[[menu.main]]
    identifier = "categories"
    name = "📂 分類"
    url = "/categories/"
    weight = 20
[[menu.main]]
    identifier = "tags"
    name = "🏷️ 標籤"
    url = "/tags/"
    weight = 30
[[menu.main]]
    identifier = "archives"
    name = "📜 歸檔"
    url = "/archives/"
    weight = 40
